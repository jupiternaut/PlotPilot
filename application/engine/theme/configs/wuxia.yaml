# 武侠题材配置

# ─── 基本信息 ───
genre_key: wuxia
genre_name: 武侠
description: 传统武侠/新武侠题材，涵盖江湖恩怨、门派纷争、侠义精神等核心元素

# ─── AI 人设 ───
system_persona: |
  你是一位深谙武侠之道的小说大师，
  传承金庸之厚重、古龙之飘逸、梁羽生之典雅。
  你擅长以精妙的武功描写为筋骨，以快意恩仇的江湖故事为血肉，
  写出既有侠义精神又有人性深度的武侠故事。
  你精通「以武入道」「正邪辩证」「侠之大者」等武侠核心主题，
  让读者在刀光剑影中感受到武侠世界独有的浪漫与哲思。

# ─── 写作规则 ───
writing_rules:
  - 武打场景必须有具体的招式拆解和身法描写，不能只写「打了起来」
  - 内功/轻功/暗器的运用要有武学逻辑，不能随意突破物理极限
  - 江湖规矩（如武林盟主、华山论剑、六大门派）需保持一致
  - 侠义精神的体现要通过行动而非说教，「路见不平拔刀相助」要有具体场景
  - 武功修炼需有循序渐进的过程，不能看了本秘籍就天下无敌
  - 正邪双方都应有合理的行事逻辑，反派不能只是纯粹的恶

# ─── 世界观约束 ───
world_rules: |
  本作世界观基于武侠江湖：
  - 武功是核心实力，但内功修为 > 招式花哨
  - 门派/帮会有明确的势力范围和规矩
  - 武林有公认的排名体系（如天下十大高手）
  - 江湖规矩（不杀妇孺、一对一挑战、信义为重）是行为底线
  - 朝廷与江湖的关系是重要的权力张力来源

# ─── 氛围基调 ───
atmosphere: |
  整体基调：侠骨柔情 + 快意恩仇。
  战斗场景需有刀光剑影的动态美感；
  江湖场景需有豪迈洒脱的武侠气质；
  情感场景需有含蓄内敛的古典美感。

# ─── 禁忌 ───
taboos:
  - 不要出现超出武侠范畴的超自然力量（如飞天遁地、法术）
  - 不要让主角仅凭一本秘籍就跨越多个实力层级
  - 不要让江湖前辈全部沦为路人甲
  - 不要忽视武器/暗器的物理限制（如剑气不能劈山断岳）

# ─── 可用套路 ───
tropes_to_use:
  - 仗剑行侠：路见不平、侠义之举引发连锁剧情
  - 比武论剑：高手过招的精彩对决和武学交流
  - 身世之谜：主角或关键人物的隐藏身世牵动全局
  - 武林大会：各路英雄汇聚、恩怨交织的经典场景

# ─── 避免套路 ───
tropes_to_avoid:
  - 武力通胀：后期武功描写越来越夸张、失去武侠质感
  - 圣母侠客：主角对所有坏人都无限仁慈
  - 门派脸谱化：正派必正义、邪派必邪恶
  - 武功百科：大段列举招式名称但无实际描写

# ─── 节拍模板 ───
beat_templates:
  - keywords: ["比武", "过招", "切磋", "挑战", "论剑", "对决"]
    priority: 90
    template: |
      1. 对手亮相：外貌特征 + 气场描写
      2. 招式拆解：至少 3 个回合的攻防细节
      3. 胜负关键：一招制胜或意外转折
      4. 江湖规矩：点到为止或留手相让

  - keywords: ["修炼", "练功", "突破", "悟道", "闭关"]
    priority: 85
    template: |
      1. 境界瓶颈：当前武功遇到的障碍
      2. 机缘触发：奇遇/指点/顿悟
      3. 突破过程：经脉运行/内功心法描写
      4. 实力提升：明确新境界的能力范围

# ─── 审计标准 ───
audit_criteria:
  style_requirements:
    - 武打场景有具体招式名称和动作描写
    - 江湖气息浓厚，用词有武侠韵味
    - 侠义精神自然流露，不生硬说教

  taboos_check:
    - 未出现超自然力量（除非设定允许）
    - 武功体系逻辑自洽
    - 人物行为符合江湖规矩

  quality_metrics:
    martial_arts_depth: 0.8  # 武功描写深度
    jianghu_atmosphere: 0.85  # 江湖氛围
    character_charm: 0.75  # 人物魅力
